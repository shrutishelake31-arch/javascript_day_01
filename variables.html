<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables</title>
</head>
<body>

    <h2>Open the Console (F12) to See the Output</h2>

    <script>
        // Using var
        var name = "Shruti";

        // Using let
        let age = 20;

        // Using const
        const college = "KBP College of Engineering";

        console.log("Name:", name);
        console.log("Age:", age);
        console.log("College:", college);

        // Updating a let variable
        age = 21;
        console.log("Updated Age:", age);

        // Uncommenting the line below will cause an error because const cannot be changed
        // college = "DBATU";
    </script>

</body>
</html>
